{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block main-content %}
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-5">
      <h1><a class="navbar-brand text-dark fw-bold fs-3" href="#">Job Portal</a></h1>
    </div>
    <div class="d-flex">
      {% if user.is_authenticated %}
      <a href="#" class="btn btn-primary me-3">Welcome - {{ user|truncatechars:10 }}</a> 
      <a href="/logout" class="btn btn-danger">Logout</a>
      {% else %}
      <a href="/login/"><button type="button" class="btn btn-outline-success me-3 mt-1">Login</button></a>
      <a href="/signup/"><button type="button" class="btn btn-outline-success me-3 mt-1">SignUp</button></a>
      {% endif %}
    </div>
  </nav>
{% endblock main-content %}
